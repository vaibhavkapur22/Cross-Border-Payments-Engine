title: Cross-Border Payments Engine
description: Stablecoin-powered remittance engine for fast, low-cost USD→INR cross-border transfers via USDC on Base Sepolia
theme: just-the-docs
color_scheme: dark

url: https://vaibhavkapur22.github.io
baseurl: /Cross-Border-Payments-Engine

aux_links:
  GitHub:
    - https://github.com/vaibhavkapur22/Cross-border-Payments-Engine

aux_links_new_tab: true

heading_anchors: true

nav_sort: order

search_enabled: true
search:
  heading_level: 3
  previews: 3

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Copyright &copy; 2026. Distributed under the <a href=\"https://github.com/vaibhavkapur22/Cross-border-Payments-Engine/blob/main/LICENSE\">MIT License.</a>"

plugins:
  - jekyll-seo-tag

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
